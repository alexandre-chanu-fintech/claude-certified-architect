name: Build and Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install -g md-to-pdf

      # BUILD HTML OUTPUT (for Pages)
      - name: Build HTML site
        run: |
          mkdir -p site
          for file in guide_*.md; do
            echo "Processing $file"
            npx md-to-pdf "$file" --as-html --output "site/${file%.md}.html"
          done

      # COPY INDEX (opzionale ma consigliato)
      - name: Create index
        run: |
          echo "<h1>Guides</h1><ul>" > site/index.html
          for f in site/*.html; do
            name=$(basename "$f")
            echo "<li><a href=\"$name\">$name</a></li>" >> site/index.html
          done
          echo "</ul>" >> site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
